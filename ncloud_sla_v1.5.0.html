}

      if(opt.choices[ch])return opt.choices[ch];
    }
  }
  return{sla:99.9,tiers:[]};

const REGION_SET=new Set(["리전 공통","한국","일본","싱가포르","미국","독일","홍콩","한국(금융)","korea","japan","singapore","us","germany"]);
function isRegion(s){return REGION_SET.has((s||"").trim())||REGION_SET.has((s||"").trim().toLowerCase());}
function isSkip(s){if(!s||s.trim().length<2)return true;const bare=s.trim().replace(/^\[.*?\]\s*/,"");if(SKIP_RE.test(bare))return true;if(/^[\d,.\s\-₩]+$/.test(bare))return true;if(/^\d{4}[-./]\d{1,2}/.test(bare))return true;return false;}

// 납부 예상요금 컬럼 키워드 (SLA 기준 금액)
const PAY_COL_KEYS=["납부 예상요금","납부예상요금","납부 예상 요금","납부금액","예상납부","결제예정금액","결제금액","실납부","payment"];
// 사용금액(gross) 컬럼 키워드
const USE_COL_KEYS=["사용금액","이용요금","이용 요금","이용금액","usage","사용요금"];

function parseNcpBilling(allRows){
  let dataStart=0,colDetail=2,colPay=-1,colUse=-1,usedPayCol=false;
  for(let i=0;i<Math.min(allRows.length,30);i++){
    const raw=allRows[i].row.map(x=>String(x||"").trim());
    const cL=raw.map(x=>x.toLowerCase());
    const di=cL.findIndex(x=>x==="상세"||x==="상세항목"||x==="detail"||x==="과금항목 그룹"||x==="과금항목그룹");
    const pi=cL.findIndex(x=>PAY_COL_KEYS.some(k=>x.includes(k.toLowerCase())));
    const ui=cL.findIndex(x=>USE_COL_KEYS.some(k=>x.includes(k.toLowerCase())));
    if(di>=0||cL.some(x=>x.includes("서비스")||x.includes("과금항목"))){
      if(di>=0)colDetail=di;
      if(pi>=0){colPay=pi;usedPayCol=true;}
      if(ui>=0)colUse=ui;
      if(colPay<0&&colUse>=0)colPay=colUse;
      dataStart=i+1;break;
    }
  }
  if(colPay<0)colPay=colUse>=0?colUse:4;
  let curProd="",curRegion="";
  const groups={},order=[];
  for(let i=0;i<allRows.length;i++){
    const c=allRows[i].row.map(x=>String(x||"").trim());
    for(let ci=0;ci<Math.min(c.length,4);ci++){if(c[ci]&&isRegion(c[ci])){curRegion=c[ci];break;}}
    for(let ci=0;ci<Math.min(colDetail,6);ci++){const v=c[ci]||"";if(!v||isRegion(v)||isSkip(v))continue;if(matchProd(v)){curProd=v;break;}}
    if(i<dataStart)continue;if(!curProd)continue;
    const detail=c[colDetail]||"";
    if(!detail||isSkip(detail))continue;if(isRegion(detail))continue;
    const payRaw=(c[colPay]||"").trim();
    const payNum=Number(payRaw.replace(/[^0-9.\-]/g,""));
    const payAmt=isNaN(payNum)?0:Math.max(0,payNum);
    const useRaw=colUse>=0?(c[colUse]||"").trim():"";
    const useNum=Number(useRaw.replace(/[^0-9.\-]/g,""));
    const useAmt=isNaN(useNum)?0:Math.max(0,useNum);
    if(!payRaw&&!useRaw)continue;
    if(matchProd(detail)&&payAmt===0&&useAmt===0)continue;
    const slaProd=matchProd(curProd);
    if(!groups[curProd]){groups[curProd]={raw:curProd,slaProd,items:[],usedPayCol};order.push(curProd);}
    groups[curProd].items.push({id:i,detail:curRegion?"["+curRegion+"] "+detail:detail,amount:payAmt,usageAmount:useAmt,selected:false});
  }
  return order.map(k=>groups[k]);
}

function monthMinutes(y,m){return new Date(y,m+1,0).getDate()*24*60;}

function getRateFromUptime(u,tiers){
  if(!tiers||!tiers.length)return 0;
  for(const t of tiers)if(u>=t.from&&u<t.to)return t.rate;
  if(u>=(tiers[tiers.length-1].to||100))return 0;
  return tiers[tiers.length-1].rate;
}

function calcUptime(prod,downMin,y,m,ev){
  ev=ev||{};const p=POLICIES[prod],total=monthMinutes(y,m),type=(p&&p.uptimeType)||"time";
  if(type==="time"||type==="worksTime")return((total-downMin)/total)*100;
  if(type==="errorRate"){const er=parseFloat(ev.avgErrorRate||"0");return(isNaN(er)||er<0)?((total-downMin)/total)*100:100-er;}
  if(type==="backupCount"){const tb=+ev.totalBackups||0,fb=+ev.failedBackups||0;return tb>0?(1-fb/tb)*100:((total-downMin)/total)*100;}
  if(type==="monitorCount"){const tm=+ev.totalMonitor||0,em=+ev.errorMonitor||0;return tm>0?(1-em/tm)*100:((total-downMin)/total)*100;}
  if(type==="objectStorageErrorRate"){
    const ec=+ev.errorCount||0,tr=+ev.totalRequests||0,dh=downMin/60;
    // PDF 공식: 월평균오류율(%) = (장애시간(h) × (오류건수/총요청건수)) / 720 × 100
    // 월가용률(%) = 100% − 월평균오류율
    if(tr>0&&dh>0){const errRate=(dh*(ec/tr))/720*100;return Math.max(0,100-errRate);}
    // 총요청건수 미입력 or 장애시간=0 → 장애시간 기반으로 fallback
    return((total-downMin)/total)*100;
  }
  return((total-downMin)/total)*100;
}

function durStr(m){if(m<=0)return"-";const d=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=Math.round(m%60);return[d&&d+"일",h&&h+"시간",mn&&mn+"분"].filter(Boolean).join(" ");}

// 효율화: splitByMonth에 음수 방어 추가
function splitByMonth(s,e){
  if(!s||!e)return[];const sd=new Date(s),ed=new Date(e);if(isNaN(sd)||isNaN(ed)||ed<=sd)return[];
  const res=[];let cur=new Date(sd);
  while(cur<ed){const nxt=new Date(cur.getFullYear(),cur.getMonth()+1,1);const end=nxt<ed?nxt:ed;res.push({year:cur.getFullYear(),month:cur.getMonth(),minutes:Math.max(0,(end-cur)/60000)});cur=nxt;}
  return res;
}

function MiniCalendar({value,onChange,minDate,accent}){

    else{const n=(Math.min(59,+mm||0)+delta+60)%60;setMm(pad2(n));emit(selDate,+hh||0,n);}

  const bS={background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:13,padding:"2px 6px",lineHeight:1,fontWeight:700};

function DateTimePicker({label,value,onChange,minDate,accent,onTabNext}){
  accent=accent||"#1565c0";
  const[text,setText]=useState("");
  const[showCal,setShowCal]=useState(false);
  const calUsed=useRef(false);
  const ref=useRef(),timer=useRef();
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setShowCal(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const isFocused=useRef(false);
  useEffect(()=>{
    if(!value||!calUsed.current)return;
    // 달력에서 선택했을 때만 text 동기화 (타이핑/붙여넣기 중에는 스킵)
    if(isFocused.current)return;
    const d=value.split("T")[0],t=(value.split("T")[1]||"").slice(0,5)||"00:00";
    setText(d+" "+t);
  },[value]);
  function parseDT(v){
    v=v.trim().replace(/\./g,"-").replace(/\s+/g," ");
    let m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2}) (\d{1,2}):(\d{2})$/);if(m)return m[1]+"-"+pad2(+m[2])+"-"+pad2(+m[3])+"T"+pad2(+m[4])+":"+pad2(+m[5])+":00";
    m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2}) (\d{1,2})$/);if(m)return m[1]+"-"+pad2(+m[2])+"-"+pad2(+m[3])+"T"+pad2(+m[4])+":00:00";
    m=v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);if(m)return m[1]+"-"+pad2(+m[2])+"-"+pad2(+m[3])+"T00:00:00";
    m=v.replace(/ /g,"").match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})$/);if(m)return m[1]+"-"+m[2]+"-"+m[3]+"T"+m[4]+":"+m[5]+":00";
    m=v.match(/^(\d{4})(\d{2})(\d{2})$/);if(m)return m[1]+"-"+m[2]+"-"+m[3]+"T00:00:00";
    return null;
  }
  function commit(v){const p=parseDT(v);if(p&&!isNaN(new Date(p)))onChange(p);}
  function handleChange(v){setText(v);clearTimeout(timer.current);timer.current=setTimeout(()=>commit(v),700);}
  function handleKeyDown(e){
    if(e.key==="Tab"){setShowCal(false);clearTimeout(timer.current);commit(text);if(onTabNext){e.preventDefault();onTabNext();}}
    if(e.key==="Enter"){setShowCal(false);clearTimeout(timer.current);commit(text);}
    if(e.key==="Escape")setShowCal(false);
  }
  const parsed=parseDT(text);const isValid=!!(parsed&&!isNaN(new Date(parsed)));const showErr=text.length>6&&!parsed;
  return(
    <div style={{flex:1}} ref={ref}>
      <div style={{fontSize:11,fontWeight:700,color:"#444",marginBottom:4}}>{label}</div>
      <div style={{position:"relative"}}>
        <input value={text}
          onChange={e=>handleChange(e.target.value)}
          onFocus={()=>{isFocused.current=true;setShowCal(true);}}
          onBlur={()=>{isFocused.current=false;clearTimeout(timer.current);commit(text);}}
          onPaste={e=>{
            const pasted=e.clipboardData.getData("text");
            setTimeout(()=>{const p=parseDT(pasted.trim());if(p&&!isNaN(new Date(p))){calUsed.current=false;setText(pasted.trim());commit(pasted.trim());}},0);
          }}
          onKeyDown={handleKeyDown} placeholder="2026-03-08 14:30"
          style={{width:"100%",padding:"9px 36px 9px 10px",border:"2px solid "+(showCal?accent:showErr?"#e53935":isValid?"#a5d6a7":"#ddd"),borderRadius:8,fontSize:13,boxSizing:"border-box",outline:"none",fontFamily:"monospace"}}/>
        <span onClick={()=>setShowCal(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer",fontSize:14,color:"#888",userSelect:"none"}}>CAL</span>
        {showCal&&<div style={{position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:300}}>
          <MiniCalendar value={value} onChange={v=>{calUsed.current=true;onChange(v);const d=v.split("T")[0],t=(v.split("T")[1]||"").slice(0,5)||"00:00";setText(d+" "+t);setShowCal(false);}} minDate={minDate} accent={accent}/>
        </div>}
      </div>
      <div style={{fontSize:10,marginTop:3,color:showErr?"#e53935":isValid?accent:"#bbb"}}>{showErr?"⚠ 형식 오류":isValid?"✓ "+parsed.replace("T"," ").slice(0,16):"날짜만 입력 시 00:00 적용 · 예) 2026-03-08 14:30"}</div>
    </div>
  );
}

function MonthUploader({label,selProds,groupsRef}){

  const fileRef=useRef();const xlsxLoaded=useRef(!!window.XLSX);

  useEffect(()=>{if(window.XLSX){xlsxLoaded.current=true;return;}const sc=document.createElement("script");sc.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";sc.onload=()=>{xlsxLoaded.current=true;};document.head.appendChild(sc);},[]);
  async function handleFile(file){
    if(!file)return;if(!xlsxLoaded.current){setErr("XLSX 로딩 중.");return;}
    if(!/\.xlsx?$/i.test(file.name)){setErr("xlsx/xls만 가능합니다.");return;}
    setErr("");setBusy(true);setFileName(file.name);setGroups(null);setShowAll(false);
    try{
      const ab=await file.arrayBuffer();const wb=window.XLSX.read(new Uint8Array(ab),{type:"array",cellDates:false});
      const allRows=[];
      wb.SheetNames.forEach(sn=>{const ws=wb.Sheets[sn];if(!ws)return;
        (ws["!merges"]||[]).forEach(mg=>{const bc=ws[window.XLSX.utils.encode_cell({r:mg.s.r,c:mg.s.c})];if(!bc)return;for(let r=mg.s.r;r<=mg.e.r;r++)for(let c=mg.s.c;c<=mg.e.c;c++){const a=window.XLSX.utils.encode_cell({r,c});if(!ws[a])ws[a]={t:bc.t,v:bc.v,w:bc.w||String(bc.v||"")};}});
        const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:false})||[];
        rows.forEach(row=>{if(row.some(c=>String(c||"").trim()))allRows.push({row,sheet:sn});});});
      const parsed=parseNcpBilling(allRows);
      if(!parsed.length){setErr("항목을 찾을 수 없습니다.");setBusy(false);return;}
      setGroups(parsed.map(g=>({...g,items:g.items.map(it=>({...it,selected:!!(g.slaProd&&selProds.includes(g.slaProd))}))})));
    }catch(e){setErr("파싱 실패: "+e.message);}
    setBusy(false);
  }
  function setItem(gi,id,val){setGroups(prev=>prev.map((g,i)=>i!==gi?g:{...g,items:g.items.map(it=>it.id===id?{...it,selected:val}:it)}));}
  function setGroupAll(gi,val){setGroups(prev=>prev.map((g,i)=>i!==gi?g:{...g,items:g.items.map(it=>({...it,selected:val}))}));}
  function setAll(val){setGroups(prev=>prev.map(g=>({...g,items:g.items.map(it=>({...it,selected:val}))})));}
  const allItems=groups?groups.flatMap(g=>g.items):[];
  const selItems=allItems.filter(i=>i.selected);
  const matchedGroups=groups?groups.filter(g=>g.slaProd&&selProds.includes(g.slaProd)):[];
  const unmatchedGroups=groups?groups.filter(g=>!(g.slaProd&&selProds.includes(g.slaProd))):[];
  const visibleGroups=groups?(showAll?groups:matchedGroups):[];
  return(
    <div style={{border:"1.5px solid #e0e0e0",borderRadius:10,overflow:"hidden"}}>

        <span style={{fontWeight:700,fontSize:12,color:"#1565c0"}}>{"📅 "+label}</span>
        {fileName&&<span style={{fontSize:10,color:"#888"}}>{"📄 "+fileName}</span>}
      </div>
      <div style={{padding:12}}>
        {!groups&&!busy&&<div onClick={()=>fileRef.current&&fileRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}} style={{padding:"14px",borderRadius:8,border:"2px dashed #90caf9",background:"#f3f8ff",cursor:"pointer",textAlign:"center"}}>
          <div style={{fontSize:22,marginBottom:3}}>📂</div>
          <div style={{fontSize:12,fontWeight:700,color:"#1565c0"}}>{label+" 파일 업로드"}</div>
          <div style={{fontSize:10,color:"#888",marginTop:2}}>클릭 또는 드래그 (.xlsx / .xls)</div>
        </div>}
        <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>{handleFile(e.target.files[0]);e.target.value="";}}/>
        {busy&&<div style={{textAlign:"center",padding:14,color:"#888",fontSize:12}}>📊 분석 중...</div>}
        {err&&<div style={{padding:"6px 10px",background:"#ffebee",borderRadius:6,color:"#c62828",fontSize:11,marginTop:6}}>{err}<button onClick={()=>{setErr("");setGroups(null);}} style={{marginLeft:6,fontSize:10,background:"none",border:"none",cursor:"pointer",textDecoration:"underline",color:"#c62828"}}>다시 시도</button></div>}
        {groups&&<div>
          {groups[0]&&groups[0].usedPayCol&&<div style={{padding:"6px 10px",background:"#e8f5e9",borderRadius:6,border:"1px solid #a5d6a7",fontSize:11,color:"#1b5e20",marginBottom:5}}>✅ <b>납부 예상요금</b> 컬럼 인식 완료 — SLA 크레딧은 크레딧·할인 적용 후 <b>실납부액</b> 기준으로 산정됩니다.</div>}
          {groups[0]&&!groups[0].usedPayCol&&<div style={{padding:"6px 10px",background:"#fff8e1",borderRadius:6,border:"1px solid #ffe082",fontSize:11,color:"#b36200",marginBottom:5}}>⚠ 납부 예상요금 컬럼을 찾지 못해 <b>사용금액</b> 기준으로 표시됩니다. 크레딧·할인이 있다면 수동으로 납부금액을 확인하세요.</div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,flexWrap:"wrap",gap:4}}>
            <span style={{fontSize:10,color:"#555"}}>{groups.length+"개 그룹 / "+allItems.length+"개 항목"}</span>
            <div style={{display:"flex",gap:3}}>
              <button onClick={()=>setAll(true)}  style={{fontSize:10,padding:"2px 7px",borderRadius:4,border:"1px solid #1565c0",background:"#e3f2fd",color:"#1565c0",cursor:"pointer"}}>전체선택</button>
              <button onClick={()=>setAll(false)} style={{fontSize:10,padding:"2px 7px",borderRadius:4,border:"1px solid #aaa",background:"#f5f5f5",color:"#666",cursor:"pointer"}}>전체해제</button>
              <button onClick={()=>{setGroups(null);setFileName("");setShowAll(false);}} style={{fontSize:10,padding:"2px 7px",borderRadius:4,border:"1px solid #e53935",background:"#ffebee",color:"#e53935",cursor:"pointer"}}>재업로드</button>
            </div>
          </div>
          {matchedGroups.length===0&&<div style={{padding:"6px 10px",background:"#fff8e1",borderRadius:6,border:"1px solid #ffe082",fontSize:11,color:"#b36200",marginBottom:5}}>⚠ 장애 상품에 해당하는 항목을 찾지 못했습니다.<button onClick={()=>setShowAll(true)} style={{marginLeft:6,fontSize:10,background:"none",border:"1px solid #aaa",borderRadius:3,padding:"1px 5px",cursor:"pointer",color:"#555"}}>전체 보기</button></div>}
          {matchedGroups.length>0&&unmatchedGroups.length>0&&<div style={{marginBottom:4,display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:10,color:"#888"}}>{"장애 상품 외 "+unmatchedGroups.length+"개 숨김"}</span><button onClick={()=>setShowAll(v=>!v)} style={{fontSize:10,background:"none",border:"1px solid #ccc",borderRadius:3,padding:"1px 5px",cursor:"pointer",color:"#555"}}>{showAll?"장애 상품만":"전체 보기"}</button></div>}
          <div style={{maxHeight:260,overflowY:"auto",border:"1px solid #e0e0e0",borderRadius:7,marginBottom:8}}>
            {visibleGroups.map((group,gi)=>{
              const gIdx=groups.indexOf(group);
              const gSel=group.items.filter(i=>i.selected).length;
              const gSelAmt=group.items.filter(i=>i.selected).reduce((s,i)=>s+i.amount,0);
              const gTotalAmt=group.items.reduce((s,i)=>s+i.amount,0);
              const isMatched=!!(group.slaProd&&selProds.includes(group.slaProd));
              const allSel=gSel===group.items.length,someSel=gSel>0&&!allSel;
              return(
                <div key={gi} style={{borderBottom:gi<visibleGroups.length-1?"1px solid #f0f0f0":"none"}}>
                  <div style={{padding:"7px 10px",background:isMatched?"#e8f5e9":"#f5f5f5",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <input type="checkbox" checked={allSel} ref={el=>{if(el)el.indeterminate=someSel;}} onChange={e=>setGroupAll(gIdx,e.target.checked)} style={{width:13,height:13,cursor:"pointer"}}/>
                      <span style={{fontWeight:700,fontSize:12,color:isMatched?"#1b5e20":"#333"}}>{group.raw}</span>
                      {group.slaProd&&group.slaProd!==group.raw&&<span style={{fontSize:9,color:"#1565c0",background:"#e3f2fd",borderRadius:3,padding:"1px 5px"}}>{"→ "+group.slaProd}</span>}

                    </div>

                      선택 <b style={{color:"#1565c0"}}>{gSel+"/"+group.items.length}</b>

function Step3({selProds,onConfirm,onSkip,onReset,monthSegs,prodOpts,extraVals}){
  const groupsRefs=useRef({});
  const[manualMode,setManualMode]=useState(false);
  const[manualFees,setManualFees]=useState({});// {prod_mk: 금액문자열}
  monthSegs.forEach(seg=>{const mk=seg.year+"-"+pad2(seg.month+1);if(!groupsRefs.current[mk])groupsRefs.current[mk]={current:null};});
  function setManualFee(prod,mk,val){setManualFees(prev=>({...prev,[prod+"__"+mk]:val}));}
  function getManualFee(prod,mk){return manualFees[prod+"__"+mk]||"";}
  function confirmAll(){
    const fee={},det={};
    if(manualMode){
      selProds.forEach(prod=>{
        monthSegs.forEach(seg=>{
          const mk=seg.year+"-"+pad2(seg.month+1);
          const raw=getManualFee(prod,mk).replace(/[^0-9]/g,"");
          const amt=Number(raw)||0;
          if(amt>0){
            if(!fee[prod])fee[prod]={};fee[prod][mk]=(fee[prod][mk]||0)+amt;
          }
        });
      });
    } else {
      monthSegs.forEach(seg=>{
        const mk=seg.year+"-"+pad2(seg.month+1);
        const groups=(groupsRefs.current[mk]||{}).current;if(!groups)return;
        groups.forEach(g=>{
          const sp=g.slaProd;if(!sp||!selProds.includes(sp))return;
          const items=g.items.filter(i=>i.selected);const amt=items.reduce((s,i)=>s+i.amount,0);
          if(!fee[sp])fee[sp]={};fee[sp][mk]=(fee[sp][mk]||0)+amt;
          if(!det[sp])det[sp]={};if(!det[sp][mk])det[sp][mk]=[];
          items.forEach(i=>det[sp][mk].push({detail:i.detail,amount:i.amount}));
        });
      });
    }
    onConfirm(fee,det);
  }
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {monthSegs.length>0&&selProds.length>0&&<div style={{background:"#fff",borderRadius:12,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#1a237e",marginBottom:8}}>📊 적용 보상율</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {selProds.map(prod=>monthSegs.map((seg,si)=>{
            const{tiers}=getActivePolicy(prod,prodOpts);
            const uptime=calcUptime(prod,seg.minutes,seg.year,seg.month,extraVals[prod]||{});
            const rate=getRateFromUptime(uptime,tiers);const clr=rate>0?"#1565c0":"#2e7d32";
            return(<div key={prod+si} style={{padding:"6px 12px",borderRadius:8,background:rate>0?"#e3f2fd":"#e8f5e9",border:"1.5px solid "+(rate>0?"#90caf9":"#a5d6a7")}}>
              <div style={{fontSize:11,fontWeight:700,color:"#333"}}>{prod+" · "+seg.year+"/"+pad2(seg.month+1)}</div>
              <div style={{fontSize:16,fontWeight:800,color:clr}}>{rate>0?Math.round(rate*100)+"%":"보상없음"}</div>
              <div style={{fontSize:10,color:"#888"}}>{uptime.toFixed(3)+"% 가동률"}</div>
            </div>);
          }))}
        </div>
      </div>}
      <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"#1565c0",marginBottom:2}}>이용요금 입력<span style={{fontSize:11,background:"#f3f4f6",color:"#888",borderRadius:4,padding:"1px 6px",fontWeight:400,marginLeft:6}}>선택사항</span></div>
            <div style={{fontSize:11,color:"#888"}}>{manualMode?"상품·월별 납부 예상요금을 직접 입력하세요":"청구서 엑셀을 업로드하거나 직접 금액을 입력하세요"}</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #ddd",fontSize:11}}>
                <button onClick={()=>setManualMode(false)} style={{padding:"5px 12px",background:manualMode?"#f5f5f5":"#1565c0",color:manualMode?"#888":"#fff",border:"none",cursor:"pointer",fontWeight:manualMode?400:700}}>파일 업로드</button>
                <button onClick={()=>setManualMode(true)}  style={{padding:"5px 12px",background:manualMode?"#1565c0":"#f5f5f5",color:manualMode?"#fff":"#888",border:"none",cursor:"pointer",fontWeight:manualMode?700:400}}>직접 입력</button>

            </div>
        </div>
        {!manualMode&&<div style={{fontSize:11,color:"#333",marginBottom:14,padding:"10px 14px",background:"#fff8e1",borderRadius:8,border:"1px solid #ffe082",lineHeight:2.0}}>
          💡 NAP/NPP/NFA &gt; 고객사 조회 &gt; 청구 탭 &gt; 장애 발생 이용월 상세내역 조회 &gt; 상세 요금 내역 조회 &gt; <b>Excel 다운로드</b>
          <br/><span style={{fontSize:10,color:"#e65100",fontWeight:600}}>⚠ 월이 걸친 장애는 각 이용월 파일을 따로 업로드하세요</span>
        </div>}
        {manualMode&&<div style={{marginBottom:14,padding:"10px 14px",background:"#f0f4ff",borderRadius:8,border:"1px solid #c5cae9",fontSize:11,color:"#333",lineHeight:1.8}}>

        </div>}
        {monthSegs.length>0
          ? manualMode

                {monthSegs.map(seg=>{

                  return(
                    <div key={mk} style={{border:"1.5px solid #e0e0e0",borderRadius:10,overflow:"hidden"}}>

function NwApp(){
  var stepState=useState(1),step=stepState[0],setStep=stepState[1];
  var prodsState=useState([]),selProds=prodsState[0],setSelProds=prodsState[1];
  var startState=useState(""),startDt=startState[0],setStartDt=startState[1];
  var endState=useState(""),endDt=endState[0],setEndDt=endState[1];
  var billState=useState(null),setBillingData=billState[1];
  var resState=useState(null),results=resState[0],setResults=resState[1];
  var monthSegs=startDt&&endDt?splitByMonth(startDt,endDt):[];
  var green="#00c73c",darkGreen="#007a28";

  function doReset(){setStep(1);setResults(null);setBillingData(null);setStartDt("");setEndDt("");setSelProds([]);}
  function canNext(){if(step===1)return selProds.length>0;if(step===2)return monthSegs.length>0;return false;}
  function stepDone(s){if(s===1)return selProds.length>0;if(s===2)return monthSegs.length>0;if(s===3)return!!results;if(s===4)return!!results;return false;}

  function computeAndGo(fee,det){
    var hasBilling=!!fee&&Object.keys(fee).length>0;
    setBillingData(hasBilling?fee:null);
    var segs=splitByMonth(startDt,endDt);var res=[];
    selProds.forEach(function(prod){
      var pol=getActivePolicy(prod,{});var tiers=pol.tiers;
      segs.forEach(function(seg){
        var mk=seg.year+"-"+pad2(seg.month+1);
        var feeNum=fee&&fee[prod]&&fee[prod][mk]?fee[prod][mk]:0;
        var details=(det&&det[prod]&&det[prod][mk])||[];
        var uptime=calcUptime(prod,seg.minutes,seg.year,seg.month,{});
        var rate=getRateFromUptime(uptime,tiers);
        var credit=feeNum>0?Math.floor(feeNum*rate/10)*10:0;
        res.push({prod:prod,year:seg.year,month:seg.month,downMin:seg.minutes,uptime:uptime,rate:rate,feeNum:feeNum,credit:credit,details:details});
      });
    });
    setResults(res);setStep(4);
  }

  var NW_STEPS=[
    {num:1,label:"서비스 선택",icon:"1"},
    {num:2,label:"장애 기간 입력",icon:"2"},
    {num:3,label:"이용요금 업로드",icon:"3"},
    {num:4,label:"결과 확인",icon:"4"}
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
        <div style={{display:"flex",alignItems:"center"}}>
          {NW_STEPS.map(function(s,i){
            var done=stepDone(s.num),active=step===s.num;
            return(
              <div key={s.num} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
                {i>0&&<div style={{position:"absolute",left:0,top:14,width:"50%",height:3,background:stepDone(s.num-1)?green:"#e0e0e0",zIndex:0}}/>}
                {i<3&&<div style={{position:"absolute",right:0,top:14,width:"50%",height:3,background:done?green:"#e0e0e0",zIndex:0}}/>}
                <div onClick={function(){if(done||active||stepDone(s.num-1))setStep(s.num);}} style={{width:28,height:28,borderRadius:"50%",background:done?green:active?"#52d68a":"#e0e0e0",color:"#fff",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",zIndex:1,cursor:"pointer"}}>
                  {done&&step>s.num?"V":s.icon}
                </div>
                <div style={{fontSize:10,marginTop:4,color:active?green:done?"#555":"#aaa",fontWeight:active?700:400,textAlign:"center"}}>{s.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      {step===1&&<NwStep1 selProds={selProds} setSelProds={setSelProds}/>}
      {step===2&&<Step2 selProds={selProds} prodOpts={{}} extraVals={{}} startDt={startDt} setStartDt={setStartDt} endDt={endDt} setEndDt={setEndDt} monthSegs={monthSegs}/>}
      {step===3&&<Step3 selProds={selProds} onConfirm={computeAndGo} onSkip={function(){computeAndGo(null,null);}} onReset={doReset} monthSegs={monthSegs} prodOpts={{}} extraVals={{}}/>}
      {step===4&&results&&<Step4 results={results} startDt={startDt} endDt={endDt} hasBilling={!!results} prodOpts={{}}/>}

      <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
        <button onClick={function(){setStep(function(s){return Math.max(1,s-1);});}} disabled={step===1} style={{padding:"10px 20px",borderRadius:8,border:"1.5px solid #ddd",background:"#fff",color:"#555",fontSize:13,cursor:step===1?"default":"pointer",opacity:step===1?0.4:1,fontWeight:600}}>이전</button>
        {step<3&&<button onClick={function(){if(canNext())setStep(function(s){return s+1;});}} disabled={!canNext()} style={{padding:"10px 24px",borderRadius:8,border:"none",background:green,color:"#fff",fontSize:13,cursor:canNext()?"pointer":"default",opacity:canNext()?1:0.4,fontWeight:700}}>다음</button>}
        {step===4&&<button onClick={doReset} style={{padding:"10px 20px",borderRadius:8,border:"none",background:"#e8f9f0",color:darkGreen,fontSize:13,cursor:"pointer",fontWeight:700}}>처음부터</button>}
      </div>

      <div style={{padding:"10px 14px",background:"#fff",borderRadius:10,fontSize:10,color:"#888",lineHeight:1.8}}>
        NAVER WORKS SLA 계산기 (참고용) | 크레딧: 10원 단위 미만 절삭, 실제 납부금액 초과 불가
        <a href={NW_SLA_URL} target="_blank" rel="noreferrer" style={{color:green,marginLeft:6}}>공식 SLA 원문</a>
      </div>
    </div>
  );
}

// ── 메인 App (탭 분리) ──────────────────────────────────────
const STEPS=[{num:1,label:"장애 상품 선택",icon:"🖥"},{num:2,label:"장애 기간 입력",icon:"📅"},{num:3,label:"이용요금 업로드",icon:"📂"},{num:4,label:"결과 확인",icon:"📋"}];

function App(){
  const[tab,setTab]=useState("ncp"); // "ncp" | "nw"
  const[step,setStep]=useState(1);
  const[selProds,setSelProds]=useState([]);const[prodOpts,setProdOpts]=useState({});const[extraVals,setExtraVals]=useState({});
  const[startDt,setStartDt]=useState("");const[endDt,setEndDt]=useState("");
  const[billingData,setBillingData]=useState(null);const[results,setResults]=useState(null);
  const[nwResetKey,setNwResetKey]=useState(0);
  const monthSegs=startDt&&endDt?splitByMonth(startDt,endDt):[];

  function doReset(){
    // NCP 탭 초기화
    setStep(1);setResults(null);setBillingData(null);setStartDt("");setEndDt("");
    setSelProds([]);setProdOpts({});setExtraVals({});
    // NW 탭도 key 교체로 강제 remount 초기화
    setNwResetKey(k=>k+1);
  }
  function canNext(){if(step===1)return selProds.length>0;if(step===2)return monthSegs.length>0;return false;}
  function stepDone(s){if(s===1)return selProds.length>0;if(s===2)return monthSegs.length>0;if(s===3)return!!results;if(s===4)return!!results;return false;}

  function computeAndGo(fee,det){
    const hasBilling=!!fee&&Object.keys(fee).length>0;
    setBillingData(hasBilling?fee:null);
    const segs=splitByMonth(startDt,endDt);const res=[];
    selProds.forEach(prod=>{
      const{tiers}=getActivePolicy(prod,prodOpts);const ev=extraVals[prod]||{};
      segs.forEach(seg=>{
        const mk=seg.year+"-"+pad2(seg.month+1);
        const feeNum=fee&&fee[prod]&&fee[prod][mk]?fee[prod][mk]:0;
        const details=(det&&det[prod]&&det[prod][mk])||[];
        const uptime=calcUptime(prod,seg.minutes,seg.year,seg.month,ev);
        const rate=getRateFromUptime(uptime,tiers);
        const credit=feeNum>0?Math.floor(feeNum*rate/10)*10:0;
        res.push({prod,year:seg.year,month:seg.month,downMin:seg.minutes,uptime,rate,feeNum,credit,details});
      });
    });
    setResults(res);setStep(4);
  }

  const isNw=tab==="nw";
  const themeBlue="#1565c0",themeGreen="#00c73c";

  return(
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#f0f4f8",minHeight:"100vh",padding:"12px 16px"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>

        
        <div style={{padding:"8px 20px 4px",background:isNw?"linear-gradient(135deg,#005c1a,#003d11)":"linear-gradient(135deg,#0d3b7a,#061f4a)",borderRadius:"14px 14px 0 0",display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.9)",background:"rgba(255,255,255,.18)",border:"1px solid rgba(255,255,255,.35)",borderRadius:4,padding:"1px 8px",letterSpacing:"0.05em"}}>사내용</span>
            <span style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,.75)",background:"rgba(255,165,0,.35)",border:"1px solid rgba(255,165,0,.5)",borderRadius:4,padding:"1px 7px",letterSpacing:"0.05em"}}>BETA</span>
          </div>
          <span style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>참고용 · 공식 원문 병행 확인 권장</span>
        </div>
        <div style={{padding:"14px 20px",marginBottom:0,
          background:isNw?"linear-gradient(135deg,#00c73c,#007a28)":"linear-gradient(135deg,#1565c0,#0d47a1)",
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>
              {isNw?"🟢 NAVER WORKS SLA 계산기":"🔵 NCP SLA 계산기"}
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.85)",marginTop:2}}>
              {isNw?"NAVER WORKS 공식 SLA 기준 · 청구서 자동파싱":"공식 SLA 기준 · 청구서 자동파싱"}
            </div>
          </div>
          <a href={isNw?NW_SLA_URL:SLA_URL} target="_blank" rel="noreferrer"
            style={{fontSize:11,color:"#fff",background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",padding:"5px 12px",borderRadius:8,textDecoration:"none"}}>
            📄 공식 SLA
          </a>
        </div>

        
        <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #e0e0e0",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          {[["ncp","🔵 NCP 클라우드",themeBlue],["nw","🟢 NAVER WORKS",themeGreen]].map(([key,label,color])=>(
            <button key={key} onClick={()=>setTab(key)}
              style={{flex:1,padding:"12px 8px",border:"none",borderBottom:tab===key?"3px solid "+color:"3px solid transparent",
                background:"#fff",fontSize:13,fontWeight:tab===key?700:400,
                color:tab===key?color:"#888",cursor:"pointer",transition:"all 0.15s",marginBottom:"-2px"}}>
              {label}
            </button>
          ))}
        </div>
        <div style={{padding:"4px 14px",background:"#f8f9fa",borderBottom:"1px solid #e0e0e0",marginBottom:12,display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10}}>
          <span style={{fontSize:10,color:"#bbb",fontFamily:"monospace"}}>{APP_VERSION}</span>
          <span style={{fontSize:10,color:"#ddd"}}>|</span>
          <span style={{fontSize:10,color:"#bbb"}}>{APP_DATE}</span>
        </div>

        
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {isNw
            ? <NwApp key={"nw-"+nwResetKey}/>
            : <>
                <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.08)"}}>
                  <div style={{display:"flex",alignItems:"center"}}>
                    {STEPS.map((s,i)=>{const done=stepDone(s.num),active=step===s.num;return(
                      <div key={s.num} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
                        {i>0&&<div style={{position:"absolute",left:0,top:14,width:"50%",height:3,background:stepDone(s.num-1)?themeBlue:"#e0e0e0",zIndex:0}}/>}
                        {i<3&&<div style={{position:"absolute",right:0,top:14,width:"50%",height:3,background:done?themeBlue:"#e0e0e0",zIndex:0}}/>}
                        <div onClick={()=>{if(done||active||stepDone(s.num-1))setStep(s.num);}} style={{width:28,height:28,borderRadius:"50%",background:done?themeBlue:active?"#42a5f5":"#e0e0e0",color:"#fff",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",zIndex:1,cursor:"pointer",boxShadow:active?"0 0 0 3px rgba(66,165,245,.4)":"none"}}>
                          {done&&step>s.num?"✓":s.icon}
                        </div>
                        <div style={{fontSize:10,marginTop:4,color:active?themeBlue:done?"#555":"#aaa",fontWeight:active?700:400,textAlign:"center"}}>{s.label}</div>
                      </div>
                    );})}
                  </div>
                </div>
                {step===1&&<Step1 selProds={selProds} setSelProds={setSelProds} prodOpts={prodOpts} setProdOpts={setProdOpts} extraVals={extraVals} setExtraVals={setExtraVals}/>}
                {step===2&&<Step2 selProds={selProds} prodOpts={prodOpts} extraVals={extraVals} startDt={startDt} setStartDt={setStartDt} endDt={endDt} setEndDt={setEndDt} monthSegs={monthSegs}/>}
                {step===3&&<Step3 selProds={selProds} onConfirm={computeAndGo} onSkip={()=>computeAndGo(null,null)} onReset={doReset} monthSegs={monthSegs} prodOpts={prodOpts} extraVals={extraVals}/>}
                {step===4&&results&&<Step4 results={results} startDt={startDt} endDt={endDt} hasBilling={!!billingData} prodOpts={prodOpts}/>}
                <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                  <button onClick={()=>setStep(s=>Math.max(1,s-1))} disabled={step===1} style={{padding:"10px 20px",borderRadius:8,border:"1.5px solid #ddd",background:"#fff",color:"#555",fontSize:13,cursor:step===1?"default":"pointer",opacity:step===1?0.4:1,fontWeight:600}}>이전</button>
                  {step<3&&<button onClick={()=>{if(canNext())setStep(s=>s+1);}} disabled={!canNext()} style={{padding:"10px 24px",borderRadius:8,border:"none",background:themeBlue,color:"#fff",fontSize:13,cursor:canNext()?"pointer":"default",opacity:canNext()?1:0.4,fontWeight:700}}>다음</button>}
                  {step===4&&<button onClick={doReset} style={{padding:"10px 20px",borderRadius:8,border:"none",background:"#e3f2fd",color:themeBlue,fontSize:13,cursor:"pointer",fontWeight:700}}>🔄 처음부터</button>}
                </div>
                <div style={{marginTop:4,padding:"10px 14px",background:"#fff",borderRadius:10,fontSize:10,color:"#888",lineHeight:1.8,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
                  ⚠ 유의사항 — 본 계산기는 공식 NCP SLA 정책 기반 참고용입니다. 최신 정책은 <a href={SLA_URL} target="_blank" rel="noreferrer" style={{color:themeBlue,fontWeight:600}}>공식 SLA 정책 원문</a>에서 확인하세요.
                  File Storage / Media Connect Center / WORKBOX의 일부 보상 상한값은 공식 원문 재확인을 권장합니다.
                </div>
              </>
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
<script>
// Babel 로드 완료 후 실행
if (typeof Babel !== 'undefined') {
  runApp();
} else {
  showErr('Babel 로딩 실패');
}
</script>
</body>
</html>
